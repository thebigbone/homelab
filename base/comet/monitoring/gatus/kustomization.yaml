# =============== top level gatus ks ===============
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - deployment.yaml
  - service.yaml
  - config.yaml
  - sa.yaml
  - namespace.yaml
  - ../../../../netpols/deny-by-default-ingress.yaml
  - ../../../../netpols/allow-envoy-ingress.yaml
  - ../../../../netpols/allow-egress-internet.yaml
  - ../../../../netpols/allow-dns-egress.yaml
  - ./routes
  - servicemonitor.yaml

components:
  - ../../../../shared/components/gvisor

patches:
  - target:
      kind: NetworkPolicy
      name: allow-from-gateway
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/component: gatus
  - target:
      kind: NetworkPolicy
      name: allow-dns-egress
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/component: gatus
  - target:
      kind: NetworkPolicy
      name: allow-egress-internet
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/component: gatus
