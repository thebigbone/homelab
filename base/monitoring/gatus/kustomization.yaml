# =============== top level gatus ks ===============
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - deployment.yaml
  - service.yaml
  - config.yaml
  - sa.yaml
  - namespace.yaml
  - ../../netpol/deny-by-default-egress.yaml
  - ../../netpol/deny-by-default-ingress.yaml
  - allow-ext4-egress.yaml

commonLabels:
  app.kubernetes.io/name: gatus
  gatus: true
