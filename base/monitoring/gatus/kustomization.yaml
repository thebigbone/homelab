# =============== top level gatus ks ===============
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - deployment.yaml
  - service.yaml
  - config.yaml
  - sa.yaml
  - namespace.yaml
  - ../../netpols/deny-by-default-egress.yaml
  - ../../netpols/deny-by-default-ingress.yaml
  - ../../netpols/allow-dns.yaml

patches:
  - target:
      kind: NetworkPolicy
      name: allow-dns
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/name: gatus

commonLabels:
  app.kubernetes.io/name: gatus
