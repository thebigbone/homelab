apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aio
  namespace: external-apps
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "aio.ext4.xyz"
  rules:
    - backendRefs:
        - name: aio
          port: 3000
