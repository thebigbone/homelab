# =============== top level gatus ks ===============
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - ../../../comet/monitoring/gatus/deployment.yaml
  - ../../../comet/monitoring/gatus/service.yaml
  - ../../../comet/monitoring/gatus/sa.yaml
  - ../../../comet/monitoring/gatus/namespace.yaml
  - ../../../comet/monitoring/gatus/routes
  - ../../../../netpols/deny-by-default-ingress.yaml
  - ../../../../netpols/allow-envoy-ingress.yaml
  - ../../../../netpols/allow-egress-internet.yaml
  - ../../../comet/monitoring/gatus/allow-dns-egress.yaml
  - config.yaml

patches:
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: gatus-route
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: "uptime.ext4.xyz"
  - target:
      kind: NetworkPolicy
      name: allow-from-gateway
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/component: gatus
  - target:
      kind: NetworkPolicy
      name: allow-egress-internet
    patch: |-
      - op: add
        path: /spec/podSelector
        value:
          matchLabels:
            app.kubernetes.io/component: gatus

