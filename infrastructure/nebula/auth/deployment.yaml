apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: pocket-id
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pocket-id
    spec:
      serviceAccountName: pocket-id
      terminationGracePeriodSeconds: 5
      nodeSelector:
        kubernetes.io/hostname: k3s-remote-01
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.8@sha256:0028bb80c0170a22b6914bca7542a97956d174368521052e77b137fc9c9d7598
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1411
              name: http
              protocol: TCP
          env:
            - name: APP_URL
              value: "https://id.ext4.xyz"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secret
                  key: encryption-key
            - name: TRUST_PROXY
              value: "true"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - mountPath: /app/data
              name: pocket-id
          livenessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 90
            timeoutSeconds: 5
            failureThreshold: 2
          readinessProbe:
            exec:
              command:
                - /app/pocket-id
                - healthcheck
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: pocket-id
          hostPath:
            path: /var/lib/pocket-id
            type: DirectoryOrCreate
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
