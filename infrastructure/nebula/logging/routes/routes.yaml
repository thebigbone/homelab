apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vl-route
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "logs.ext4.xyz"
  rules:
    - backendRefs:
        - name: logging-stack-victoria-logs-cluster-vlselect
          port: 9471
