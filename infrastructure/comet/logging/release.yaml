apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logging
  namespace: logging-system
spec:
  releaseName: logging-stack
  chart:
    spec:
      chart: victoria-logs-cluster
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: logging-system
      version: 0.2.5
  interval: 60m
  timeout: 10m
  install:
    remediation:
      retries: 5
    crds: Create
  upgrade:
    remediation:
      retries: 5
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: logging-base-values
      valuesKey: values.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logging-base-values
  namespace: logging-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    vlstorage:
      persistentVolume:
        enabled: true
        existingClaim: "vlstorage"
      replicaCount: 1
    vmauth:
      enabled: true
