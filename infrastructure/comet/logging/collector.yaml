apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logging
  namespace: logging-system
spec:
  releaseName: logging-stack
  chart:
    spec:
      chart: victoria-logs-collector
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: logging-system
      version: 0.2.5
  interval: 60m
  timeout: 10m
  install:
    remediation:
      retries: 5
    crds: Create
  upgrade:
    remediation:
      retries: 5
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: collector-base-values
      valuesKey: values.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-base-values
  namespace: logging-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    remoteWrite:
      - http://logging-stack-victoria-logs-cluster-vmauth:8427
    collector:
      includePodLabels: true
      includePodAnnotations: false
      includeNodeLabels: false
      includeNodeAnnotations: false
