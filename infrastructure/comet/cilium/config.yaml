apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-values
  namespace: kube-system
data:
  values.yaml: |
    k8sServiceHost: 192.168.0.154
    k8sServicePort: 6443
    kubeProxyReplacement: true
    hubble:
      enabled: true
      metrics:
        enabled:
        - dns:query
        - drop
        - tcp
        - flow
        - icmp
        - http
      relay:
        enabled: true
    encryption:
      enabled: true
      type: wireguard
      wireguard:
        userspaceFallback: false
