apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - path: deployment.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      annotationSelector: "gvisor.kustomize/exclude!=true"
  - path: statefulset.yaml
    target:
      group: apps
      version: v1
      kind: StatefulSet
      annotationSelector: "gvisor.kustomize/exclude!=true"
  - path: cronjob.yaml
    target:
      group: batch
      version: v1
      kind: CronJob
      annotationSelector: "gvisor.kustomize/exclude!=true"
